name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MKC_DEBUG: ${{ vars.MKC_DEBUG || 'false' }}
    steps:
      - name: Checkout (with submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vendor/pxt/kiosk/package-lock.json

      - name: Apply overrides
        run: ./scripts/apply-overrides.sh

      - name: Install kiosk deps
        working-directory: vendor/pxt/kiosk
        run: npm ci

      - name: Stage react family at vendor/pxt root
        # Upstream pxt's monorepo expects react+react-dom+@types to live at
        # vendor/pxt/node_modules. The kiosk's `tsconfig.paths.json` aliases
        # `react/*` and `react-dom/*` to `../node_modules/...` (relative to
        # kiosk/), and `react-app-alias-ex` propagates those aliases to
        # webpack — so EVERY `import "react"` in the bundle (kiosk source AND
        # react-common's components) resolves to vendor/pxt/node_modules/react.
        # That's the single-React-instance discipline. Without it (or without
        # the aliases pointing here), kiosk imports its transitive 18.2.0
        # while react-common imports vendor/pxt's — two physical React copies,
        # producing a runtime "useReducer is null" error.
        # --ignore-scripts dodges leveldown's native-compile failure.
        working-directory: vendor/pxt
        run: |
          npm install --no-save --no-audit --no-fund --no-package-lock \
            --ignore-scripts \
            react@^18 react-dom@^18 \
            @types/react @types/react-dom

      - name: Build kiosk
        working-directory: vendor/pxt/kiosk
        env:
          CI: false
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: vendor/pxt/kiosk/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
