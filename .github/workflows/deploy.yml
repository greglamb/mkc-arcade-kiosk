name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MKC_DEBUG: ${{ vars.MKC_DEBUG || 'false' }}
    steps:
      - name: Checkout (with submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vendor/pxt/kiosk/package-lock.json

      - name: Apply overrides
        run: ./scripts/apply-overrides.sh

      - name: Install kiosk deps
        working-directory: vendor/pxt/kiosk
        run: npm ci

      - name: Build kiosk
        working-directory: vendor/pxt/kiosk
        env:
          CI: false
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: vendor/pxt/kiosk/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
