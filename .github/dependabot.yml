version: 2
updates:
  - package-ecosystem: gitsubmodule
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    commit-message:
      prefix: "deps(pxt)"
    labels:
      - "dependencies"
      - "submodule"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"
